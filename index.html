<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel de Nomenclatura</title>
  <style>
    :root {
      --bg: #08111f;
      --bg-2: #0f172a;
      --paper: rgba(15, 23, 42, 0.82);
      --ink: #e5eefb;
      --muted: #9fb0c7;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --line: rgba(148, 163, 184, 0.22);
      --danger: #fb7185;
      --ok: #34d399;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(56, 189, 248, 0.18) 0, rgba(56, 189, 248, 0) 30%),
        radial-gradient(circle at 85% 10%, rgba(52, 211, 153, 0.14) 0, rgba(52, 211, 153, 0) 28%),
        radial-gradient(circle at 80% 90%, rgba(251, 113, 133, 0.12) 0, rgba(251, 113, 133, 0) 26%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--ink);
      min-height: 100vh;
    }

    .wrap {
      max-width: 980px;
      margin: 24px auto 40px;
      padding: 0 16px 24px;
    }

    .hero {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(8, 17, 31, 0.82));
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(10px);
      margin-bottom: 16px;
    }

    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.2px;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: rgba(15, 23, 42, 0.7);
    }

    .stat-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      display: block;
      font-size: 24px;
      font-weight: 700;
      color: var(--ink);
    }

    .stat-helper {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .btn {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.9);
      color: var(--ink);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn.primary:hover { background: var(--accent-2); }

    .btn.danger {
      color: #fff;
      border-color: rgba(251, 113, 133, 0.35);
      background: rgba(190, 18, 60, 0.35);
    }

    .btn.danger:hover {
      background: rgba(190, 18, 60, 0.48);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
      animation: enter .25s ease;
      backdrop-filter: blur(8px);
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .card-head {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.14);
      border: 1px solid rgba(56, 189, 248, 0.24);
      color: #bfdbfe;
    }

    .time {
      font-size: 12px;
      color: var(--muted);
    }

    .url {
      word-break: break-all;
      font-size: 13px;
      color: var(--ink);
      background: rgba(15, 23, 42, 0.85);
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      padding: 8px;
      margin-top: 6px;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      width: 90px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1px;
      text-align: center;
      background: rgba(8, 17, 31, 0.9);
      color: var(--ink);
    }

    .pill {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(52, 211, 153, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.25);
      color: #bbf7d0;
    }

    .status {
      margin: 14px 0;
      font-weight: 600;
      min-height: 20px;
    }

    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 30px 10px;
      border: 2px dashed var(--line);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.72);
    }

    .empty strong {
      display: block;
      color: var(--ink);
      margin-bottom: 6px;
    }

    @media (max-width: 720px) {
      .head {
        flex-direction: column;
        align-items: stretch;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="head">
        <div>
          <h1>Panel de Nomenclatura</h1>
          <p class="sub">Recibe URLs sin letra desde la extensión, asigna la campaña y deja que el worker la consuma en paralelo.</p>
        </div>
        <button id="refreshBtn" class="btn">Recargar</button>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-label">Pendientes activos</span>
          <span id="totalCount" class="stat-value">0</span>
          <span class="stat-helper">URLs esperando letra</span>
        </div>
        <div class="stat">
          <span class="stat-label">Estado</span>
          <span class="stat-value">Live</span>
          <span id="updatedAt" class="stat-helper">Sin actualización todavía</span>
        </div>
        <div class="stat">
          <span class="stat-label">Acción</span>
          <span class="stat-value">Asignar</span>
          <span class="stat-helper">Guardar, mapear o eliminar</span>
        </div>
      </div>
    </div>

    <div id="status" class="status"></div>
    <div id="list" class="grid"></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
